<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBBia: A Ilha da iA</title>
    <link rel="stylesheet" href="style.css">
    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="ui-layer">
        <h1>👁️ BBBia: A Ilha da iA</h1>
        <div id="time-display">
            <div class="time-line">
                Dificuldade: Sobrevivência | Tick: <span id="tick-counter">0</span> | 
                <label style="cursor: pointer; background: #333; padding: 2px 5px; border-radius: 4px; border: 1px solid #555; font-size: 12px; vertical-align: middle;">
                    <input type="checkbox" id="fast-mode-checkbox" onchange="toggleFastMode(this.checked)"> Sem Intervalo
                </label>
                | <span id="day-night-icon" style="font-weight: bold;">☀️ Dia</span>
            </div>
            <div class="time-line" style="margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; display: flex; align-items: center; gap: 8px; justify-content: center; font-size: 13px;">
                👥 <select id="player-count-selector" style="background: #333; color: #ffeb3b; border: 1px solid #555; border-radius: 4px; padding: 1px 3px; cursor: pointer; font-weight: bold; font-size: 12px;">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4" selected>4 Players</option>
                </select>
                | ⏱️ <select id="tick-interval-selector" onchange="updateTickInterval(this.value)" style="background: #333; color: #ffeb3b; border: 1px solid #555; border-radius: 4px; padding: 1px 3px; cursor: pointer; font-weight: bold; font-size: 12px;">
                    <option value="1">1s</option>
                    <option value="2">2s</option>
                    <option value="3">3s</option>
                    <option value="4">4s</option>
                    <option value="5" selected>5s</option>
                </select>
                | 🕒 <span id="game-clock" style="color: #4fc3f7; font-weight: bold; font-family: monospace;">06:00</span>
                | <span style="color: #ffeb3b;">Turno: <strong id="next-agent">-</strong> (<strong id="countdown">5.0</strong>s)</span>
            </div>
        </div>
        <div id="status-panel">
            <div id="volume-control">
                <span>🔊</span>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="updateVolume(this.value)">
            </div>
            <h3>Status do Servidor: <span id="ws-status" class="disconnected">Desconectado</span></h3>
            <ul id="agent-list">
                <!-- Agent stats will populate here -->
            </ul>
            <div id="hall-of-fame" style="margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
                <h4 style="color: #ffeb3b; margin: 0 0 5px 0;">🏆 Hall da Fama (Vitórias)</h4>
                <div id="scores-list" style="font-size: 14px;">
                    <!-- Scores will populate here -->
                </div>
                <h4 style="color: #ff9800; margin: 10px 0 5px 0;">📜 Recordes de Vida</h4>
                <div id="records-list" style="font-size: 13px;">
                    <!-- Life records will populate here -->
                </div>
            </div>
        </div>

        <div id="inventories">
            <!-- Inventories will be injected here -->
        </div>
        
        <div id="chat-panel">
            <div id="chat-filters">
                <button class="filter-btn active" onclick="setChatFilter('all')">Todos</button>
                <button class="filter-btn" id="filter-joao" onclick="setChatFilter('João')" style="display:none">João</button>
                <button class="filter-btn" id="filter-maria" onclick="setChatFilter('Maria')" style="display:none">Maria</button>
                <button class="filter-btn" id="filter-zeca" onclick="setChatFilter('Zeca')" style="display:none">Zeca</button>
                <button class="filter-btn" id="filter-elly" onclick="setChatFilter('Elly')" style="display:none">Elly</button>
                <label style="margin-left: auto; font-size: 11px; cursor: pointer; display: flex; align-items: center; color: #ccc;">
                    <input type="checkbox" id="chat-autoscroll" checked style="margin-right: 4px;"> Autoscroll
                </label>
            </div>
            <ul id="chat-messages"></ul>
        </div>
    </div>
    
    <!-- Canvas container for Three.js -->
    <div id="canvas-container"></div>
    
    <!-- Container for HTML speech bubbles overlay -->
    <div id="bubbles-layer"></div>

    <!-- Victory Overlay -->
    <div id="victory-overlay" class="hidden">
        <div class="victory-content">
            <h1 id="victory-title">🏆 VENCEDOR! 🏆</h1>
            <h2 id="winner-name">---</h2>
            <div class="winner-stats">
                <p>HP: <span id="win-hp">0</span></p>
                <p>Fome: <span id="win-fome">0</span></p>
                <p>Sede: <span id="win-sede">0</span></p>
                <p>❤️ Amizade: <span id="win-friendship">0</span></p>
            </div>
            <p id="reset-countdown-text" style="color: #ffeb3b; font-size: 18px; margin-top: 15px;">
                Reiniciando em: <span id="reset-timer">120</span>s
            </p>
            <button id="reset-btn" onclick="resetGame(document.getElementById('player-count-selector').value)">NOVA PARTIDA</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
