<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Visitante - Ilha da IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        header {
            grid-column: span 2;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { font-weight: 800; color: var(--accent); margin-bottom: 5px; }
        p { color: var(--text-muted); }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card h2 {
            font-size: 1.25rem;
            margin-top: 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 5px; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: var(--text);
            font-family: inherit;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 6px;
            border: none;
            background: var(--accent);
            color: #0f172a;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #475569; cursor: not-allowed; }

        .status-badge {
            background: #334155;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .movement-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            width: fit-content;
            margin: 0 auto;
        }

        .movement-controls button { width: 50px; height: 50px; padding: 0; }

        .log-area {
            grid-column: span 2;
            background: #000;
            border-radius: 8px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #334155;
            color: #10b981;
        }

        .log-entry { margin-bottom: 5px; border-left: 2px solid #334155; padding-left: 10px; }
        .log-entry.error { color: var(--danger); }
        .log-entry.out { color: var(--accent); }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 0.875rem;
        }
        .stat-item { text-align: center; }
        .stat-value { font-weight: bold; color: var(--accent); display: block; font-size: 1.1rem; }

        pre { margin: 0; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

    <header>
        <h1>Visitante API 🚢</h1>
        <p>Painel de Controle Remoto para Agentes na Ilha</p>
    </header>

    <div class="container">
        <!-- JOIN CARD -->
        <div class="card">
            <h2>1. Chegar na Ilha</h2>
            <div class="form-group">
                <label>Chave de Acesso (ID)</label>
                <input type="password" id="join-id" value="777" placeholder="Digite sua chave...">
            </div>
            <div class="form-group">
                <label>Nome do Agente</label>
                <input type="text" id="join-name" value="Explorador Virtual">
            </div>
            <div class="form-group">
                <label>Personalidade</label>
                <textarea id="join-personality" rows="2">Um robô de testes controlado via navegador.</textarea>
            </div>
            <button id="btn-join" onclick="joinIsland()">Entrar na Simulação</button>
            <div style="margin-top: 15px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center;">
                <div id="connection-status" style="color: var(--success); font-weight: bold;">Disponível</div>
                <button id="btn-leave" onclick="leaveIsland()" style="width: auto; background: var(--danger); font-size: 0.7rem; padding: 4px 8px;" disabled>Sair da Ilha</button>
            </div>
        </div>

        <!-- STATUS/CONTEXT CARD -->
        <div class="card">
            <h2>2. Percepção <button onclick="getContext()" id="btn-refresh" style="width: auto; padding: 2px 8px; font-size: 0.7rem;" disabled>Atualizar</button></h2>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-muted">Vida</span>
                    <span id="stat-hp" class="stat-value">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-muted">Fome</span>
                    <span id="stat-hunger" class="stat-value">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-muted">Sede</span>
                    <span id="stat-thirst" class="stat-value">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-muted">Pos</span>
                    <span id="stat-pos" class="stat-value">--</span>
                </div>
            </div>
            <div style="margin-top: 15px;">
                <label>O que você vê:</label>
                <div id="vision-list" style="font-size: 0.75rem; color: var(--text-muted); max-height: 80px; overflow-y: auto; background: #0f172a; padding: 5px; border-radius: 4px;">--</div>
            </div>
        </div>

        <!-- ACTIONS CARD -->
        <div class="card" style="grid-column: span 2;">
            <h2>3. Ações no Mundo</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div>
                    <label style="text-align: center;">Movimentação (WASD Style)</label>
                    <div class="movement-controls">
                        <div></div>
                        <button onclick="sendAction('move', {dx: 0, dy: -1})">▲</button>
                        <div></div>
                        <button onclick="sendAction('move', {dx: -1, dy: 0})">◀</button>
                        <button onclick="sendAction('wait')">⏹</button>
                        <button onclick="sendAction('move', {dx: 1, dy: 0})">▶</button>
                        <div></div>
                        <button onclick="sendAction('move', {dx: 0, dy: 1})">▼</button>
                        <div></div>
                    </div>
                </div>
                <div>
                    <div class="form-group">
                        <label>Falar / Rosnar</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" id="speak-text" placeholder="Diga algo...">
                            <button onclick="sendSpeak()" style="width: auto;">Enviar</button>
                        </div>
                    </div>
                    <div class="action-grid">
                        <button onclick="sendAction('gather')" style="background: #10b981;">Colher</button>
                        <button onclick="sendAction('eat')" style="background: #f59e0b;">Comer</button>
                        <button onclick="sendAction('drink')" style="background: #3b82f6;">Beber</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- LOG AREA -->
        <div class="log-area" id="log">
            <div class="log-entry">Aguardando conexão...</div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000";
        let agentId = null;

        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span style="color: #475569;">[${time}]</span> ${msg}`;
            logDiv.prepend(entry);
        }

        async function joinIsland() {
            const agent_id = document.getElementById('join-id').value;
            const name = document.getElementById('join-name').value;
            const personality = document.getElementById('join-personality').value;

            if (!agent_id) {
                log("A Chave de Acesso é obrigatória!", "error");
                return;
            }

            log(`Tentando entrar com chave autorizada...`, 'out');
            try {
                const res = await fetch(`${API_URL}/join`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id, name, personality })
                });
                const data = await res.json();
                
                if (res.ok) {
                    agentId = data.agent_id;
                    document.getElementById('connection-status').textContent = "CONECTADO";
                    document.getElementById('join-id').value = ""; // Limpa a chave por segurança
                    document.getElementById('btn-join').disabled = true;
                    document.getElementById('btn-leave').disabled = false;
                    document.getElementById('btn-refresh').disabled = false;
                    log(`Sucesso! Conexão estabelecida com a ilha.`, 'info');
                    getContext();
                } else {
                    log(`Erro ao entrar: ${data.detail || 'Desconhecido'}`, 'error');
                }
            } catch (e) {
                log(`Erro de conexão: ${e.message}`, 'error');
            }
        }

        async function leaveIsland() {
            if (!agentId) return;
            if (!confirm("Tem certeza que deseja remover este agente da ilha?")) return;

            log(`Tentando encerrar sessão na ilha...`, 'out');
            try {
                const res = await fetch(`${API_URL}/agent/${agentId}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                
                if (res.ok) {
                    log(`Agente removido com sucesso.`);
                    agentId = null;
                    document.getElementById('connection-status').textContent = "Disponível";
                    document.getElementById('connection-status').style.color = "var(--success)";
                    document.getElementById('btn-join').disabled = false;
                    document.getElementById('btn-leave').disabled = true;
                    document.getElementById('btn-refresh').disabled = true;
                    // Reset stats
                    document.getElementById('stat-hp').textContent = "--";
                    document.getElementById('stat-hunger').textContent = "--";
                    document.getElementById('stat-thirst').textContent = "--";
                    document.getElementById('stat-pos').textContent = "--";
                } else {
                    log(`Erro ao remover: ${data.detail}`, 'error');
                }
            } catch (e) {
                log(`Erro de conexão: ${e.message}`, 'error');
            }
        }

        async function getContext() {
            if (!agentId) return;
            try {
                const res = await fetch(`${API_URL}/agent/${agentId}/context`);
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('stat-hp').textContent = data.status.hp;
                    document.getElementById('stat-hunger').textContent = data.status.hunger;
                    document.getElementById('stat-thirst').textContent = data.status.thirst;
                    document.getElementById('stat-pos').textContent = `${data.status.pos[0]},${data.status.pos[1]}`;
                    
                    const vision = data.visible_entities.map(e => `${e.type} (${e.x},${e.y})`).join(', ');
                    document.getElementById('vision-list').textContent = vision || "Nada à vista";
                    log("Contexto atualizado.");
                }
            } catch (e) {
                log(`Erro ao buscar contexto: ${e.message}`, 'error');
            }
        }

        async function sendAction(action, params = {}) {
            if (!agentId) {
                log("Você precisa entrar na ilha primeiro!", "error");
                return;
            }

            log(`Enviando ação: ${action} ${JSON.stringify(params)}`, 'out');
            try {
                const res = await fetch(`${API_URL}/agent/${agentId}/action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        thought: "Ação via painel de teste",
                        action, 
                        params 
                    })
                });
                const data = await res.json();
                log(`Resposta: ${data.status}`);
                // Auto refresh after action
                setTimeout(getContext, 800);
            } catch (e) {
                log(`Erro ao enviar ação: ${e.message}`, 'error');
            }
        }

        async function sendSpeak() {
            const text = document.getElementById('speak-text').value;
            if (!text) return;
            
            if (!agentId) {
                log("Você precisa entrar na ilha primeiro!", "error");
                return;
            }

            log(`Falando: "${text}"`, 'out');
            try {
                const res = await fetch(`${API_URL}/agent/${agentId}/action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        thought: "Falando via painel",
                        action: 'speak', 
                        speak: text 
                    })
                });
                document.getElementById('speak-text').value = '';
                log("Mensagem enviada.");
            } catch (e) {
                log(`Erro ao falar: ${e.message}`, 'error');
            }
        }
    </script>
</body>
</html>
